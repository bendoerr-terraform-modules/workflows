name: Lint

# Reusable lint for bendoerr-terraform-modules/* TF-module repos (group B: the 12 sharing the TF-module
# lint DNA). NOT for the shell/docker custodian (different toolchain, keeps its own).
# Common jobs (prettier/misspell/alex/markdownlint/actionlint/mdformat) always run; the TF/Go jobs
# (tflint/trivy/golangci/terraform-docs) are boolean-gated so subset repos (e.g. tflint-plugin, fargate)
# turn off what they don't have. Knobs (tflint_version, markdownlint_flags, egress allowlist) are inputs;
# defaults = the lambda baseline. Triggers stay in the caller. No required_status_checks reference any
# lint check -> rename is cosmetic, no gate; the canary's proof is a behavioral-fidelity diff.
#
# allowed-endpoints MUST be SPACE-separated (folded > scalar): harden-runner splits on spaces, not newlines.

on:
  workflow_call:
    inputs:
      tflint:
        description: "Run the tflint job."
        type: boolean
        default: true
      trivy:
        description: "Run the trivy job."
        type: boolean
        default: true
      golangci:
        description: "Run the golangci-lint job."
        type: boolean
        default: true
      terraform_docs:
        description: "Run the terraform-docs drift-check job."
        type: boolean
        default: true
      tflint_version:
        description: "tflint version for the tflint job."
        type: string
        default: "v0.49.0"
      markdownlint_flags:
        description: "Flags for markdownlint."
        type: string
        default: "--disable MD033 MD013 -- ."
      golangci_workdir:
        description: "golangci-lint workdir. Default test/ (terratest layout); pass empty/root for Go-tool repos whose module is at the repo root."
        type: string
        default: "test/"
      golangci_go_version_file:
        description: "go.mod path for the golangci-lint job's setup-go."
        type: string
        default: "test/go.mod"
      allowed-endpoints:
        description: "harden-runner egress allowlist - SPACE-separated host:port (folded > scalar)."
        type: string
        default: >
          api.github.com:443
          check.trivy.dev:443
          checkpoint-api.hashicorp.com:443
          files.pythonhosted.org:443
          ghcr.io:443
          github.com:22
          github.com:443
          go.dev:443
          golang.org:443
          mirror.gcr.io:443
          objects.githubusercontent.com:443
          pkg-containers.githubusercontent.com:443
          pypi.org:443
          raw.githubusercontent.com:443
          registry.npmjs.org:443
          release-assets.githubusercontent.com:443
          releases.hashicorp.com:443
          tuf-repo-cdn.sigstore.dev:443

permissions:
  contents: read

jobs:
  tflint:
    runs-on: ubuntu-latest
    if: ${{ inputs.tflint }}
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: tflint
        uses: step-security/action-tflint@285fe25934512644274b253b424a5d4b8f1c2dc5 # v1.25.0
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
          tflint_version: ${{ inputs.tflint_version }}
          tflint_init: true
          flags: --no-module --recursive
  trivy:
    runs-on: ubuntu-latest
    if: ${{ inputs.trivy }}
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: trivy
        uses: reviewdog/action-trivy@a1e6d7dd5520369c076d7ce639a16442938535d8 # v1.14.0
        with:
          github_token: ${{ github.token }}
          trivy_command: config
          trivy_target: "."
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
  golangci-lint:
    runs-on: ubuntu-latest
    if: ${{ inputs.golangci }}
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: golangci-lint
        uses: step-security/action-golangci-lint@096b936e7ef257fb5595a0461574bec4dd400fbf # v2.10.0
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
          workdir: ${{ inputs.golangci_workdir }}
          go_version_file: ${{ inputs.golangci_go_version_file }}
  prettier:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: create package.json
        # Pinned exact (not a floating ^range): a prettier minor bump must not
        # silently reformat the tree out from under contributors. Markdown is
        # excluded from prettier via .prettierignore — mdformat owns it.
        run: |
          echo -e '{"devDependencies": {"prettier": "3.3.3"}}' > package.json
      - name: prettier
        uses: EPMatt/reviewdog-action-prettier@f691104cbeb4b0299df971275444c64be93c03ae # v1.3.0
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
  misspell:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: misspell
        uses: step-security/action-misspell@85d31a4bcbf1c3d99e4f224c148330e45b5a63cf # v1.27.2
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: none
          filter_mode: file
          exclude: |
            ./.git/*
            ./.cache/*
  alex:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: alex
        uses: reviewdog/action-alex@b6673b547eeb6d430c87ef02dc3524bdf34e324d # v1.16.1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: none
          filter_mode: file
          alex_flags: |
            * .github/* .github/workflows/* docs/* test/* examples/complete/*
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: markdownlint
        uses: step-security/action-markdownlint@7eff996c965b6b4a8575f7971d970fc40479c321 # v0.26.9
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: none
          filter_mode: file
          markdownlint_flags: ${{ inputs.markdownlint_flags }}
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: actionlint
        uses: step-security/action-actionlint@c3aa382d371c6b05513ae5907d4f77713e21813c # v1.72.0
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file

  mdformat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Read-only job: pip-install + mdformat --check, no git writes. Don't
          # leave the repo token in .git/config after checkout.
          persist-credentials: false

      # mdformat (frozen 0.7.17, same version as the pre-commit hook) is the
      # org's authoritative markdown formatter — prettier is excluded from
      # markdown via .prettierignore. Hard-check that EVERY committed markdown
      # file is mdformat-clean, not just the terraform-docs README block, so a
      # green CI means "all markdown is mdformat-canonical".
      - name: mdformat --check
        run: |
          python3 -m pip install --quiet 'mdformat==0.7.17'
          python3 -m mdformat --check .

  terraform-docs:
    runs-on: ubuntu-latest
    if: ${{ inputs.terraform_docs }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Read-only job: regenerate the README block and diff-check it locally,
          # no git writes. Don't leave the repo token in .git/config after checkout.
          persist-credentials: false

      # Regenerate the README terraform-docs block the same way the pre-commit
      # hook does (v0.24.0, --indent 3) and fail if it drifts from what is
      # committed. The block is terraform-docs output that is then run through
      # mdformat (the org's authoritative markdown formatter — prettier is kept
      # off markdown via .prettierignore), matching the pre-commit hook chain,
      # so we run mdformat too before comparing.
      - name: Install terraform-docs
        env:
          TERRAFORM_DOCS_VERSION: v0.24.0
        run: |
          curl -fsSL "https://github.com/terraform-docs/terraform-docs/releases/download/${TERRAFORM_DOCS_VERSION}/terraform-docs-${TERRAFORM_DOCS_VERSION}-linux-amd64.tar.gz" -o /tmp/terraform-docs.tar.gz
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp terraform-docs
          sudo install -m 0755 /tmp/terraform-docs /usr/local/bin/terraform-docs

      - name: Regenerate terraform-docs block
        run: terraform-docs markdown table --indent 3 --output-file README.md --output-mode inject .

      - name: Normalize with mdformat
        # mdformat pinned to the same version as the pre-commit hook (frozen 0.7.17)
        # so CI and local pre-commit produce byte-identical markdown.
        run: |
          python3 -m pip install --quiet 'mdformat==0.7.17'
          python3 -m mdformat README.md

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error file=README.md::terraform-docs output is out of date. Run the pre-commit terraform-docs hook (markdown table --indent 3) and mdformat, then commit README.md."
            exit 1
          fi
